<h2 mat-dialog-title>
    <mat-icon color="warn" style="vertical-align: middle; margin-right: 6px;">error_outline</mat-icon>
    Error
</h2>
<mat-dialog-content>
    <p style="white-space: pre-wrap;">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-raised-button color="accent" mat-dialog-close>Close</button>
</mat-dialog-actions>
